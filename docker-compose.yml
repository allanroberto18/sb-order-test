services:
  postgres:
    image: postgres:17-alpine
    container_name: order-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-order}
      POSTGRES_USER: ${POSTGRES_USER:-order}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-order}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-order} -d ${POSTGRES_DB:-order}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data