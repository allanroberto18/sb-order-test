spring:
  application:
    name: ${APP_NAME:order}

  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/order}
    username: ${DB_USERNAME:order}
    password: ${DB_PASSWORD:order}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/order}
    user: ${DB_USERNAME:order}
    password: ${DB_PASSWORD:order}
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration

  threads:
    virtual:
      enabled: true

  ai:
    model:
      chat: ${SPRING_AI_CHAT_MODEL_PROVIDER:openai}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        model: ${AI_MODEL:gpt-4.1-mini}
        temperature: 0

server:
  port: ${SERVER_PORT:8080}

app:
  scheduling:
    order-processing-cron: ${ORDER_PROCESSING_CRON:0 */5 * * * *}
  ai:
    provider: ${AI_PROVIDER:openai}
    model: ${AI_MODEL:gpt-4.1-mini}
    timeout: ${AI_TIMEOUT:PT20S}
    knowledge-base-resource: ${KNOWLEDGE_BASE_RESOURCE:knowledge_base.json}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /swagger.json

logging:
  level:
    root: ${ROOT_LOG_LEVEL:INFO}
    br.com.alr.order: ${APP_LOG_LEVEL:INFO}