spring:
  application:
    name: ${APP_NAME:order}

  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/order}
    username: ${DB_USERNAME:order}
    password: ${DB_PASSWORD:order}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/order}
    user: ${DB_USERNAME:order}
    password: ${DB_PASSWORD:order}
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration

  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /swagger.json

logging:
  level:
    root: ${ROOT_LOG_LEVEL:INFO}
    br.com.alr.order: ${APP_LOG_LEVEL:INFO}