spring:
  application:
    name: ${APP_NAME:order}

  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /swagger.json

logging:
  level:
    root: ${ROOT_LOG_LEVEL:INFO}
    br.com.alr.order: ${APP_LOG_LEVEL:INFO}